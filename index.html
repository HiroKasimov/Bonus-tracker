<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yandex Bonus Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#020208;color:#e0e0ff;
  font-family:'Share Tech Mono',monospace;
  min-height:100vh;padding:20px 16px 80px;
  overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(255,170,0,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,170,0,0.05) 1px,transparent 1px);
  background-size:40px 40px;animation:grid 25s linear infinite;
  pointer-events:none;z-index:0;
}
@keyframes grid{0%{background-position:0 0}100%{background-position:40px 40px}}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.1) 3px,rgba(0,0,0,0.1) 4px);pointer-events:none;z-index:0;}

.wrap{position:relative;z-index:1;}

header{text-align:center;padding:28px 0 20px;margin-bottom:20px;}
header h1{
  font-family:'Orbitron',sans-serif;font-size:24px;font-weight:900;
  color:#ffaa00;text-shadow:0 0 7px #ffaa00,0 0 21px #ffaa00,0 0 42px #ffaa00,0 0 80px #ffaa00;
  letter-spacing:3px;animation:flicker 4s infinite;
}
header p{font-size:12px;color:rgba(255,170,0,0.6);letter-spacing:2px;margin-top:6px;}
@keyframes flicker{0%,19%,21%,23%,54%,56%,100%{opacity:1}20%,22%,55%{opacity:0.5}}

/* Week setup card */
.setup-card{
  background:rgba(255,170,0,0.06);border:1px solid rgba(255,170,0,0.45);
  border-radius:14px;padding:18px;margin-bottom:20px;
  box-shadow:0 0 25px rgba(255,170,0,0.15),inset 0 0 20px rgba(255,170,0,0.03);
}
.setup-title{
  font-family:'Orbitron',sans-serif;font-size:13px;letter-spacing:2px;
  color:#ffaa00;margin-bottom:14px;
  text-shadow:0 0 10px #ffaa00;
}
.date-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.fg label{display:block;font-size:12px;color:rgba(255,255,255,0.7);margin-bottom:6px;letter-spacing:1px;text-transform:uppercase;}
.fg input,.fg select{
  width:100%;background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,170,0,0.35);border-radius:8px;
  padding:12px 14px;color:#ffffff;
  font-family:'Share Tech Mono',monospace;font-size:15px;outline:none;
}
.fg input:focus{border-color:rgba(255,170,0,0.9);box-shadow:0 0 12px rgba(255,170,0,0.3);}

/* Progress summary */
.summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px;}
.stat-card{
  border-radius:12px;padding:14px 8px;text-align:center;position:relative;overflow:hidden;
}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cc),transparent);}
.stat-label{font-size:11px;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;opacity:0.8;}
.stat-val{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:700;}

.card-done{background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.6);--cc:#00ff88;box-shadow:0 0 20px rgba(0,255,136,0.25),inset 0 0 20px rgba(0,255,136,0.05);}
.card-done .stat-val{color:#00ff88;text-shadow:0 0 8px #00ff88,0 0 20px #00ff88,0 0 40px #00ff88;}
.card-left{background:rgba(255,170,0,0.1);border:1px solid rgba(255,170,0,0.6);--cc:#ffaa00;box-shadow:0 0 20px rgba(255,170,0,0.25),inset 0 0 20px rgba(255,170,0,0.05);}
.card-left .stat-val{color:#ffaa00;text-shadow:0 0 8px #ffaa00,0 0 20px #ffaa00,0 0 40px #ffaa00;}
.card-days{background:rgba(0,204,255,0.1);border:1px solid rgba(0,204,255,0.6);--cc:#00ccff;box-shadow:0 0 20px rgba(0,204,255,0.25),inset 0 0 20px rgba(0,204,255,0.05);}
.card-days .stat-val{color:#00ccff;text-shadow:0 0 8px #00ccff,0 0 20px #00ccff,0 0 40px #00ccff;}

/* Progress bar */
.progress-wrap{
  background:rgba(255,170,0,0.05);border:1px solid rgba(255,170,0,0.2);
  border-radius:12px;padding:16px;margin-bottom:20px;
}
.progress-title{font-size:13px;color:rgba(255,170,0,0.8);letter-spacing:2px;margin-bottom:12px;}
.progress-bar-bg{background:rgba(255,255,255,0.06);border-radius:20px;height:18px;overflow:hidden;}
.progress-bar-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,#ffaa00,#ff6600);transition:width 0.5s ease;box-shadow:0 0 15px rgba(255,170,0,0.8),0 0 30px rgba(255,170,0,0.4);}
.progress-text{display:flex;justify-content:space-between;margin-top:10px;font-size:14px;color:rgba(255,255,255,0.7);}

/* Bonus levels */


/* Daily table */
.table-card{
  background:rgba(0,204,255,0.03);border:1px solid rgba(0,204,255,0.2);
  border-radius:12px;padding:14px;margin-bottom:20px;
}
.table-title{font-size:13px;color:rgba(0,204,255,0.8);letter-spacing:2px;margin-bottom:14px;}
.day-row{
  display:grid;grid-template-columns:90px 1fr 60px;
  align-items:center;gap:10px;
  padding:12px 14px;border-radius:10px;margin-bottom:8px;
  background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);
}
.day-row.today{border-color:rgba(255,170,0,0.7);background:rgba(255,170,0,0.1);box-shadow:0 0 15px rgba(255,170,0,0.2);}
.day-row.past{opacity:0.6;}
.day-label{font-size:14px;color:rgba(255,255,255,0.8);font-weight:700;}
.day-label span{display:block;font-size:12px;color:rgba(255,255,255,0.5);margin-top:2px;}
.day-input{
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);
  border-radius:8px;padding:10px;color:#ffffff;
  font-family:'Orbitron',sans-serif;font-size:16px;font-weight:700;outline:none;
  text-align:center;width:100%;
}
.day-input:focus{border-color:rgba(255,170,0,0.9);box-shadow:0 0 12px rgba(255,170,0,0.3);}
.day-total{font-family:'Orbitron',sans-serif;font-size:14px;color:#00ff88;text-align:right;text-shadow:0 0 8px #00ff88;font-weight:700;}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(255,170,0,0.15);border:1px solid rgba(255,170,0,0.4);color:#ffaa00;padding:10px 24px;border-radius:30px;font-size:11px;letter-spacing:2px;z-index:200;display:none;}
.toast.show{display:block;animation:fadeOut 2s forwards;}
@keyframes fadeOut{0%{opacity:0;transform:translateX(-50%) translateY(8px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}80%{opacity:1}100%{opacity:0}}
</style>
</head>
<body>
<div class="wrap">

<header>
  <h1>🚀 BONUS TRACKER</h1>
  <p>YANDEX HAFTALIK BONUS TIZIMI</p>
</header>

<!-- Setup -->
<div class="setup-card">
  <div class="setup-title">[ HAFTA SOZLAMALARI ]</div>
  <div class="date-row">
    <div class="fg">
      <label>Boshlanish</label>
      <input type="date" id="startDate">
    </div>
    <div class="fg">
      <label>Tugash</label>
      <input type="date" id="endDate" readonly>
    </div>
  </div>
  <div class="fg">
    <label>Maqsad (zakaz soni)</label>
    <input type="number" id="targetZakaz" placeholder="Masalan: 60" min="1">
  </div>
</div>

<!-- Summary -->
<div class="summary">
  <div class="stat-card card-done">
    <div class="stat-label">BAJARILDI</div>
    <div class="stat-val" id="totalDone">0</div>
  </div>
  <div class="stat-card card-left">
    <div class="stat-label">QOLDI</div>
    <div class="stat-val" id="totalLeft">-</div>
  </div>
  <div class="stat-card card-days">
    <div class="stat-label">KUN QOLDI</div>
    <div class="stat-val" id="daysLeft">-</div>
  </div>
</div>

<!-- Progress -->
<div class="progress-wrap">
  <div class="progress-title">[ PROGRESS ]</div>
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
  </div>
  <div class="progress-text">
    <span id="progressPct">0%</span>
    <span id="progressLabel">0 / 0 zakaz</span>
  </div>
</div>



<!-- Daily table -->
<div class="table-card">
  <div class="table-title">[ KUNLIK ZAKAZLAR ]</div>
  <div id="dayTable"></div>
</div>

</div>

<div class="toast" id="toast"></div>

<script>
var DAYS_UZ = ['Yak','Du','Se','Cho','Pa','Ju','Sha'];
var MONTHS = ['Yan','Feb','Mar','Apr','May','Iyn','Iyl','Avg','Sen','Okt','Noy','Dek'];



var state = JSON.parse(localStorage.getItem('bonus_tracker') || '{}');
var dailyCounts = state.dailyCounts || {};
var startDate = state.startDate || '';
var targetZakaz = state.targetZakaz || 60;

function saveState(){
  localStorage.setItem('bonus_tracker', JSON.stringify({
    dailyCounts: dailyCounts,
    startDate: startDate,
    targetZakaz: targetZakaz
  }));
}

function dateToStr(d){
  return d.getFullYear()+'-'+(d.getMonth()+1<10?'0':'')+(d.getMonth()+1)+'-'+(d.getDate()<10?'0':'')+d.getDate();
}

function strToDate(s){
  var p = s.split('-');
  return new Date(parseInt(p[0]), parseInt(p[1])-1, parseInt(p[2]));
}

function todayStr(){
  return dateToStr(new Date());
}

function fmtDate(d){
  return d.getDate()+' '+MONTHS[d.getMonth()];
}

function getEndDate(start){
  var d = strToDate(start);
  d.setDate(d.getDate()+6);
  return d;
}

function getTotalDone(){
  if(!startDate) return 0;
  var total = 0;
  var start = strToDate(startDate);
  for(var i=0;i<7;i++){
    var d = new Date(start); d.setDate(start.getDate()+i);
    var ds = dateToStr(d);
    total += parseInt(dailyCounts[ds] || 0);
  }
  return total;
}

function getDaysLeft(){
  if(!startDate) return '-';
  var end = getEndDate(startDate);
  var today = new Date();
  today.setHours(0,0,0,0);
  end.setHours(23,59,59,0);
  var diff = Math.ceil((end - today) / 86400000);
  return diff > 0 ? diff : 0;
}



function fmt(n){
  return Number(n).toLocaleString('ru-RU');
}

function updateSummary(){
  var done = getTotalDone();
  var target = parseInt(targetZakaz) || 0;
  var left = target > done ? target - done : 0;
  var daysLeft = getDaysLeft();
  var pct = target > 0 ? Math.min(Math.round(done/target*100), 100) : 0;

  document.getElementById('totalDone').textContent = done;
  document.getElementById('totalLeft').textContent = left;
  document.getElementById('daysLeft').textContent = daysLeft;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressPct').textContent = pct+'%';
  document.getElementById('progressLabel').textContent = done+' / '+target+' zakaz';
}

function render(){
  var done = getTotalDone();
  var target = parseInt(targetZakaz) || 0;
  var left = target > done ? target - done : 0;
  var daysLeft = getDaysLeft();
  var pct = target > 0 ? Math.min(Math.round(done/target*100), 100) : 0;

  document.getElementById('totalDone').textContent = done;
  document.getElementById('totalLeft').textContent = left;
  document.getElementById('daysLeft').textContent = daysLeft;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressPct').textContent = pct+'%';
  document.getElementById('progressLabel').textContent = done+' / '+target+' zakaz';



  // Day table
  renderDayTable();
}

function renderDayTable(){
  if(!startDate){
    document.getElementById('dayTable').innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.2);padding:20px;font-size:11px;letter-spacing:2px;">[ BOSHLANISH SANASINI KIRITING ]</div>';
    return;
  }

  var table = document.getElementById('dayTable');
  table.innerHTML = '';
  var today = todayStr();
  var start = strToDate(startDate);

  for(var i=0;i<7;i++){
    var d = new Date(start); d.setDate(start.getDate()+i);
    var ds = dateToStr(d);
    var isToday = ds === today;
    var isPast = ds < today;

    var row = document.createElement('div');
    row.className = 'day-row'+(isToday?' today':isPast?' past':'');

    var dayTotal = parseInt(dailyCounts[ds] || 0);

    var label = document.createElement('div');
    label.className = 'day-label';
    label.innerHTML = '<strong>'+DAYS_UZ[d.getDay()]+'</strong><span>'+fmtDate(d)+'</span>';

    var input = document.createElement('input');
    input.className = 'day-input';
    input.type = 'number';
    input.min = '0';
    input.placeholder = '0';
    input.value = dailyCounts[ds] || '';
    input.setAttribute('data-date', ds);
    input.addEventListener('input', function(){
      var date = this.getAttribute('data-date');
      var val = parseInt(this.value) || 0;
      dailyCounts[date] = val;
      saveState();
      // Faqat summary ni yangilaymiz, jadval qayta yuklanmaydi
      updateSummary();
    });
    input.addEventListener('blur', function(){
      // Focus ketganda to'liq render
      render();
    });

    var total = document.createElement('div');
    total.className = 'day-total';
    total.textContent = dayTotal > 0 ? dayTotal+' ta' : '-';

    row.appendChild(label);
    row.appendChild(input);
    row.appendChild(total);
    table.appendChild(row);
  }
}

// Setup listeners
document.getElementById('startDate').addEventListener('change', function(){
  startDate = this.value;
  if(startDate){
    var end = getEndDate(startDate);
    document.getElementById('endDate').value = dateToStr(end);
    dailyCounts = {};
  }
  saveState();
  render();
});

document.getElementById('targetZakaz').addEventListener('input', function(){
  targetZakaz = parseInt(this.value) || 0;
  saveState();
  render();
});

// Init
if(startDate){
  document.getElementById('startDate').value = startDate;
  var end = getEndDate(startDate);
  document.getElementById('endDate').value = dateToStr(end);
}
document.getElementById('targetZakaz').value = targetZakaz || '';

render();
</script>
</body>
</html>
